<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#f8d44c" />
  <title>The Boys Routine Reward Tracker</title>
  <style>
    :root{--card:#fff;--ink:#1f2937;--muted:#6b7280;--green:#3bb273;--red:#ef4444;--blue:#4f8cff;--gold:#f8d44c;--shadow:0 12px 28px rgba(31,41,55,.16);--radius:24px}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at top,#fff3a6 0,#fff8dc 42%,#e0f2fe 100%);color:var(--ink);min-height:100vh;padding:env(safe-area-inset-top) 14px env(safe-area-inset-bottom)}
    .app{max-width:560px;margin:0 auto;padding:18px 0 28px}
    header{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}
    .title-block h1{margin:0;font-size:1.62rem;line-height:1.05;letter-spacing:-.03em}
    .title-block p{margin:5px 0 0;color:var(--muted);font-weight:700}
    .pill{border:0;border-radius:999px;padding:10px 12px;background:var(--card);box-shadow:var(--shadow);font-weight:900;color:var(--ink)}
    .child-switch{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
    .child-btn{border:0;border-radius:20px;padding:14px;background:#fff;box-shadow:var(--shadow);font-size:1.05rem;font-weight:950;color:var(--ink)}
    .child-btn.active{background:var(--blue);color:white}
    .score-card{background:linear-gradient(145deg,#fff,#fff1a8);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);margin-bottom:16px;position:relative;overflow:hidden;transition:transform .2s ease, box-shadow .2s ease}
    .score-card::after{content:attr(data-icon);position:absolute;right:14px;top:8px;font-size:4.4rem;opacity:.17;transform:rotate(10deg)}
    .score-card.ready{background:linear-gradient(145deg,#fff7ad,#ffd166,#ff9f1c);box-shadow:0 0 0 4px rgba(248,212,76,.35),0 18px 38px rgba(31,41,55,.22);animation:pulsePrize 1.1s infinite}
    @keyframes pulsePrize{0%,100%{transform:scale(1)}50%{transform:scale(1.015)}}
    .score-row{display:flex;justify-content:space-between;align-items:end;gap:12px;position:relative;z-index:1}
    .score-label{font-size:.9rem;color:var(--muted);font-weight:900;text-transform:uppercase;letter-spacing:.04em}
    .score-card.ready .score-label,.score-card.ready .reward-name{color:#7c2d12}
    .score{font-size:4rem;font-weight:950;line-height:.95;letter-spacing:-.06em}
    .next-reward{text-align:right;font-weight:900}.reward-name{color:var(--green);font-size:1.02rem}
    .progress-wrap{margin-top:14px;background:rgba(255,255,255,.8);border-radius:999px;height:18px;overflow:hidden;position:relative;z-index:1}
    .progress-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--green),var(--blue));border-radius:999px;transition:width .24s ease}
    .score-card.ready .progress-bar{background:linear-gradient(90deg,#f97316,#22c55e,#4f46e5)}
    .prize-banner{display:none;position:relative;z-index:1;margin-top:14px;background:rgba(255,255,255,.86);border-radius:20px;padding:14px;text-align:center;font-weight:950}
    .score-card.ready .prize-banner{display:block}
    .claim-btn{display:none;width:100%;border:0;border-radius:20px;background:#16a34a;color:white;padding:16px;margin-top:10px;font-size:1.05rem;font-weight:950;box-shadow:var(--shadow)}
    .claim-btn.show{display:block;animation:pulseButton 1s infinite}
    @keyframes pulseButton{0%,100%{transform:scale(1)}50%{transform:scale(1.025)}}
    .quick-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
    button{cursor:pointer;user-select:none;font-family:inherit}
    .routine-grid{display:grid;grid-template-columns:1fr;gap:12px}
    .routine-btn,.small-btn,.control-btn,.step-btn{border:0;border-radius:20px;background:var(--card);color:var(--ink);box-shadow:var(--shadow);font-weight:900}
    .routine-btn{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:12px;text-align:left;padding:16px;min-height:76px}
    .routine-icon{font-size:2.1rem;width:48px;height:48px;display:grid;place-items:center;border-radius:16px;background:#f3f4f6}
    .routine-title{font-size:1.1rem;line-height:1.1}
    .routine-subtitle{color:var(--muted);font-size:.86rem;margin-top:4px;font-weight:750}
    .routine-points{color:var(--green);font-size:1rem;white-space:nowrap}
    .small-btn{padding:13px 12px;font-size:.96rem}
    .small-btn.negative{color:var(--red)}
    .small-btn.secondary{color:var(--blue)}
    .modal-backdrop{position:fixed;inset:0;background:rgba(17,24,39,.42);display:none;align-items:end;justify-content:center;padding:12px;z-index:10}
    .modal-backdrop.open{display:flex}
    .modal{width:100%;max-width:560px;background:var(--card);border-radius:30px 30px 24px 24px;padding:18px;box-shadow:0 28px 70px rgba(0,0,0,.25);animation:rise .18s ease-out;max-height:92vh;overflow:auto}
    @keyframes rise{from{transform:translateY(22px);opacity:0}to{transform:translateY(0);opacity:1}}
    .modal-header{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
    .modal-title{display:flex;align-items:center;gap:10px}
    .modal-title span:first-child{font-size:2rem}
    .modal h2{margin:0;line-height:1.08;font-size:1.45rem}
    .close-btn{border:0;border-radius:999px;width:42px;height:42px;background:#f3f4f6;color:var(--ink);font-size:1.4rem;font-weight:900}
    .script-box{background:#f9fafb;border-radius:18px;padding:12px;color:var(--muted);font-weight:800;margin-bottom:12px;border:1px solid #eef2f7}
    .steps{display:grid;gap:10px;margin-bottom:14px}
    .step-btn{display:flex;justify-content:space-between;align-items:center;padding:15px;font-size:1.05rem;text-align:left;background:#fff;border:2px solid transparent}
    .step-btn.done{border-color:var(--green);background:#ecfdf5}
    .step-name{display:flex;align-items:center;gap:10px}
    .check{width:28px;height:28px;border-radius:999px;background:#e5e7eb;display:grid;place-items:center;font-weight:950}
    .step-btn.done .check{background:var(--green);color:white}
    .modal-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .control-btn{padding:15px 12px;font-size:1rem}
    .control-btn.primary{background:var(--green);color:white}
    .control-btn.warning{background:#fff7ed;color:#c2410c}
    .control-btn:disabled{opacity:.65;cursor:not-allowed}
    .history-card{margin-top:16px;background:rgba(255,255,255,.72);border-radius:var(--radius);padding:14px;box-shadow:0 8px 20px rgba(31,41,55,.1)}
    .history-card h3{margin:0 0 10px;font-size:1rem}
    .log-list{display:grid;gap:8px;max-height:190px;overflow:auto}
    .log-item{display:flex;justify-content:space-between;gap:10px;font-size:.88rem;color:var(--muted);font-weight:750;padding-bottom:8px;border-bottom:1px solid rgba(107,114,128,.18)}
    .empty-log{color:var(--muted);font-weight:750;font-size:.92rem}
    .settings{margin-top:12px;display:grid;gap:10px}
    .settings label{font-size:.9rem;color:var(--muted);font-weight:850}
    .reward-edit-row{display:grid;grid-template-columns:92px 1fr;gap:8px;align-items:end}
    .reward-edit-row label{display:block;margin-bottom:5px}
    select,input{width:100%;border:1px solid #e5e7eb;border-radius:16px;padding:13px;font-size:1rem;font-weight:800;color:var(--ink);background:white}
    .hint{font-size:.86rem;color:var(--muted);font-weight:750;margin-top:-2px}
    @media(min-width:430px){.routine-grid{grid-template-columns:1fr 1fr}.routine-btn{grid-template-columns:1fr;min-height:150px}.routine-points{justify-self:start}}
  </style>
</head>
<body>

        <div class="reward-edit-row"><div><label for="rewardPts2">Points</label><input id="rewardPts2" type="number" min="1" step="1" /></div><div><label for="reward2">Reward 2</label><input id="reward2" /></div></div>
        <div class="reward-edit-row"><div><label for="rewardPts3">Points</label><input id="rewardPts3" type="number" min="1" step="1" /></div><div><label for="reward3">Reward 3</label><input id="reward3" /></div></div>
        <div class="reward-edit-row"><div><label for="rewardPts4">Points</label><input id="rewardPts4" type="number" min="1" step="1" /></div><div><label for="reward4">Reward 4</label><input id="reward4" /></div></div>
        <button class="control-btn primary" id="saveSettings" type="button">Save Settings</button>
      </div>
    </section>
  </div>

<script>
const STORAGE_KEY="boysRoutineRewards.v5";
const CLOUD_WEB_APP_URL="https://script.google.com/macros/s/AKfycbySRWdEgsMnPlPEFzNtBE1j-znfHLkSJx-4RGC4OYEQdLRGh_BzUsoeNKwNBROGktPbTQ/exec";
const PARENT_NAME="Parent";

const THEMES={
  dino:{label:"🦖 Dinos",icons:["🦖","🦕","🥚","🌋","🦴","⭐"],bg:"radial-gradient(circle at top,#fff3a6 0,#fff8dc 42%,#e0f2fe 100%)"},
  truck:{label:"🚚 Trucks",icons:["🚚","🚛","🚜","🛻","🏁","⭐"],bg:"radial-gradient(circle at top,#dbeafe 0,#eef6ff 44%,#fef3c7 100%)"},
  creature:{label:"⭐ Badges",icons:["⭐","⚡","🔥","💧","🌿","🏆"],bg:"radial-gradient(circle at top,#ede9fe 0,#fff7ed 45%,#dbeafe 100%)"}
};

const CHILDREN={
  Zach:{token:"Power Points",theme:"dino",rewards:[{points:5,label:"Small treat"},{points:10,label:"Pick activity"},{points:15,label:"Prize box"},{points:25,label:"Bigger toy"}]},
  Joseph:{token:"Big Kid Tokens",theme:"dino",rewards:[{points:2,label:"Pick small activity"},{points:3,label:"15 minutes tablet time"},{points:5,label:"25 minutes tablet time"},{points:8,label:"Small prize choice"}]}
};

const ROUTINES={
  Zach:[
    {id:"morning",title:"Morning Power-Up",subtitle:"Potty, teeth, clothes",iconIndex:0,script:"First potty, then teeth, then clothes. Then you earn your Morning Power-Up.",steps:[{id:"potty",label:"Potty",points:1},{id:"teeth",label:"Brush teeth",points:1},{id:"clothes",label:"Clothes on",points:1}],bonus:2},
    {id:"pottyBreak",title:"Potty Break",subtitle:"Repeatable all day",iconIndex:2,script:"Potty break first. Then you earn your Potty Power.",steps:[{id:"went",label:"Went to the potty",points:2},{id:"tried",label:"Tried without a fight",points:1},{id:"safe",label:"Safe body during potty break",points:1}],bonus:1},
    {id:"blastoff",title:"Blast-Off",subtitle:"Potty, shoes, leave",iconIndex:1,script:"Blast-off time. First potty, then shoes, then car.",steps:[{id:"potty",label:"Potty before leaving",points:2},{id:"ready",label:"Shoes / jacket",points:1},{id:"leave",label:"Walk to car / leave",points:1}],bonus:1},
    {id:"food",title:"Food Time",subtitle:"Clean hands, then food",iconIndex:2,script:"Clean hands, then food.",steps:[{id:"sink",label:"Go to sink",points:1},{id:"wash",label:"Wash hands",points:1},{id:"table",label:"Come to table",points:1}],bonus:0},
    {id:"bedtime",title:"Night Power-Down",subtitle:"Potty, teeth, PJs, bed",iconIndex:3,script:"Night Power-Down: potty, teeth, pajamas, bed.",steps:[{id:"potty",label:"Potty",points:1},{id:"teeth",label:"Brush teeth",points:1},{id:"pjs",label:"Pajamas on",points:1},{id:"bed",label:"Into bed",points:1}],bonus:2},
    {id:"safeBody",title:"Safe Body",subtitle:"Mad but safe",iconIndex:4,script:"Safe body first. Hands and toys stay safe.",steps:[{id:"hands",label:"Safe hands",points:2},{id:"toys",label:"No throwing",points:2},{id:"calm",label:"Used calm-down tool",points:1}],bonus:0},
    {id:"repair",title:"Repair Point",subtitle:"Fix after a hard moment",iconIndex:5,script:"We repair, then we move on.",steps:[{id:"pickup",label:"Picked up toy",points:1},{id:"check",label:"Checked on person",points:1},{id:"gentle",label:"Gentle hands",points:1},{id:"fix",label:"Helped fix it",points:1}],bonus:0}
  ],
  Joseph:[
    {id:"morningReady",title:"Morning Ready",subtitle:"Got ready without distracting",iconIndex:0,script:"Your job is Big Kid Ready: get yourself ready and let Zach work on his routine.",steps:[{id:"ready",label:"Got ready in the morning",points:1}],bonus:0},
    {id:"leaveReady",title:"Leaving Ready",subtitle:"Left calmly",iconIndex:1,script:"Your job is to get ready to leave calmly.",steps:[{id:"leave",label:"Got ready to leave calmly",points:1}],bonus:0},
    {id:"giveSpace",title:"Give Space",subtitle:"Space, not bossing",iconIndex:2,script:"Your job is space, not bossing. Let Zach work.",steps:[{id:"space",label:"Gave Zach space when asked",points:2}],bonus:0},
    {id:"brotherHelper",title:"Brother Helper",subtitle:"Helped calmly when asked",iconIndex:3,script:"Help only when asked. Calm helping earns.",steps:[{id:"help",label:"Helped Zach calmly when asked",points:2}],bonus:0},
    {id:"parentHelper",title:"Mom & Dad Helper",subtitle:"Helped mom or dad",iconIndex:5,script:"Big kid helper: help Mom or Dad when asked, then get back to your job.",steps:[{id:"parentHelp",label:"Helped Mom or Dad",points:2}],bonus:0},
    {id:"bedtimeReady",title:"Bedtime Routine",subtitle:"Finished bedtime routine",iconIndex:4,script:"Big Kid bedtime: finish your bedtime routine calmly.",steps:[{id:"bed",label:"Finished bedtime routine",points:1}],bonus:0},
    {id:"kindBody",title:"Kind and Safe",subtitle:"Kind words, safe body",iconIndex:5,script:"Kind words and safe body with your brother.",steps:[{id:"kind",label:"Used kind words and safe body",points:2}],bonus:0}
  ]
};

const defaultState={
  activeChild:"Zach",
  children:{
    Zach:{points:0,log:[],theme:CHILDREN.Zach.theme,rewards:CHILDREN.Zach.rewards,routineProgress:{}},
    Joseph:{points:0,log:[],theme:CHILDREN.Joseph.theme,rewards:CHILDREN.Joseph.rewards,routineProgress:{}}
  }
};

let state=loadState();
let activeRoutine=null;
let activeStepIds=new Set();
let ignoreCloudUntil=0;

const $=id=>document.getElementById(id);
const els={
  todayLabel:$("todayLabel"),score:$("score"),scoreLabel:$("scoreLabel"),scoreCard:$("scoreCard"),rewardHeader:$("rewardHeader"),nextReward:$("nextReward"),progressBar:$("progressBar"),prizeBanner:$("prizeBanner"),claimPrize:$("claimPrize"),routineGrid:$("routineGrid"),logTitle:$("logTitle"),logList:$("logList"),themeButton:$("themeButton"),routineModal:$("routineModal"),modalIcon:$("modalIcon"),modalRoutineTitle:$("modalRoutineTitle"),scriptBox:$("scriptBox"),stepsList:$("stepsList"),closeRoutine:$("closeRoutine"),finishTask:$("finishTask"),safeBonus:$("safeBonus"),addCustom:$("addCustom"),undoPoint:$("undoPoint"),parentReset:$("parentReset"),settingsButton:$("settingsButton"),settingsModal:$("settingsModal"),settingsTitle:$("settingsTitle"),settingsHint:$("settingsHint"),closeSettings:$("closeSettings"),themeSelect:$("themeSelect"),rewardPts1:$("rewardPts1"),rewardPts2:$("rewardPts2"),rewardPts3:$("rewardPts3"),rewardPts4:$("rewardPts4"),reward1:$("reward1"),reward2:$("reward2"),reward3:$("reward3"),reward4:$("reward4"),saveSettings:$("saveSettings")
};

init();

function init(){
  bindEvents();
  render();
  syncFromCloud();
  setInterval(syncFromCloud,30000);
  document.addEventListener("visibilitychange",()=>{if(!document.hidden)syncFromCloud()});
}

function bindEvents(){
  document.querySelectorAll(".child-btn").forEach(button=>{
    button.addEventListener("click",()=>{state.activeChild=button.dataset.child;saveState();render();syncFromCloud()});
  });
  els.closeRoutine.addEventListener("click",closeRoutineModal);
  els.routineModal.addEventListener("click",event=>{if(event.target===els.routineModal)closeRoutineModal()});
  els.finishTask.addEventListener("click",finishActiveTask);
  els.safeBonus.addEventListener("click",()=>{addPoints(2,"Safe body bonus");els.safeBonus.textContent="✓ Safe Body Added";els.safeBonus.disabled=true});
  els.addCustom.addEventListener("click",()=>addPoints(1,"Custom point"));
  els.undoPoint.addEventListener("click",undoLast);
  els.parentReset.addEventListener("click",parentReset);
  els.claimPrize.addEventListener("click",claimPrize);
  els.settingsButton.addEventListener("click",openSettings);
  els.closeSettings.addEventListener("click",closeSettings);
  els.settingsModal.addEventListener("click",event=>{if(event.target===els.settingsModal)closeSettings()});
  els.saveSettings.addEventListener("click",saveSettings);
  els.themeButton.addEventListener("click",cycleTheme);
}

function childState(child=state.activeChild){return state.children[child]}
function childTheme(child=state.activeChild){return childState(child).theme||CHILDREN[child].theme||"dino"}
function childRewards(child=state.activeChild){return childState(child).rewards||CHILDREN[child].rewards}
function activeTheme(){return THEMES[childTheme()]||THEMES.dino}
function sortedRewards(child=state.activeChild){return [...childRewards(child)].sort((a,b)=>Number(a.points)-Number(b.points))}
function maxReward(child=state.activeChild){const rewards=sortedRewards(child);return rewards[rewards.length-1]}
function nextReward(child=state.activeChild){const points=childState(child).points;return sortedRewards(child).find(r=>points<Number(r.points))}
function isPrizeReady(child=state.activeChild){const max=maxReward(child);return max && childState(child).points>=Number(max.points)}

function render(){
  const theme=activeTheme();
  const currentChildState=childState();
  const prizeReady=isPrizeReady();

  document.body.style.background=theme.bg;
  els.themeButton.textContent=theme.label;
  document.querySelectorAll(".child-btn").forEach(button=>button.classList.toggle("active",button.dataset.child===state.activeChild));

  els.score.textContent=currentChildState.points;
  els.scoreLabel.textContent=`${state.activeChild}’s ${CHILDREN[state.activeChild].token}`;
  els.logTitle.textContent=`${state.activeChild}’s prize-cycle log`;
  els.scoreCard.setAttribute("data-icon",state.activeChild==="Joseph"?"🏆":"🦖");
  els.scoreCard.classList.toggle("ready",prizeReady);

  const max=maxReward();
  const next=nextReward();

  if(prizeReady){
    els.rewardHeader.textContent="Grand prize earned";
    els.nextReward.textContent=`${max.points}: ${max.label}`;
    els.progressBar.style.width="100%";
    els.prizeBanner.textContent=`🎉 ${state.activeChild} earned ${max.label}! 🎉`;
    els.claimPrize.classList.add("show");
  } else if(next){
    els.rewardHeader.textContent="Next reward";
    els.nextReward.textContent=`${next.points}: ${next.label}`;
    const previous=getPreviousTier(next.points);
    const range=Math.max(1,next.points-previous);
    const earned=Math.max(0,currentChildState.points-previous);
    els.progressBar.style.width=`${Math.min(100,earned/range*100)}%`;
    els.claimPrize.classList.remove("show");
  } else {
    els.rewardHeader.textContent="All rewards earned";
    els.nextReward.textContent="Prize ready";
    els.progressBar.style.width="100%";
    els.claimPrize.classList.add("show");
  }

  renderRoutines(theme);
  renderLog();
}

function renderRoutines(theme){
  els.routineGrid.innerHTML="";
  (ROUTINES[state.activeChild]||[]).forEach(routine=>{
    const progress=getRoutineProgress(routine.id);
    const completedSteps=progress.steps?.length||0;
    const total=routine.steps.reduce((sum,step)=>sum+step.points,0)+routine.bonus;
    const button=document.createElement("button");
    button.className="routine-btn";
    button.type="button";
    button.innerHTML=`
      <div class="routine-icon">${theme.icons[routine.iconIndex]||"⭐"}</div>
      <div>
        <div class="routine-title">${routine.title}</div>
        <div class="routine-subtitle">${completedSteps?`${completedSteps}/${routine.steps.length} in progress`:routine.subtitle}</div>
      </div>
      <div class="routine-points">+${total}</div>
    `;
    button.addEventListener("click",()=>openRoutine(routine.id));
    els.routineGrid.appendChild(button);
  });
}

function renderLog(){
  const log=childState().log||[];
  els.logList.innerHTML="";
  if(!log.length){els.logList.innerHTML=`<div class="empty-log">No points in this prize cycle yet.</div>`;return}
  [...log].reverse().slice(0,50).forEach(entry=>{
    const item=document.createElement("div");
    item.className="log-item";
    item.innerHTML=`<span>${entry.label}</span><span>+${entry.points} · ${entry.time || ""}</span>`;
    els.logList.appendChild(item);
  });
}

function openRoutine(id){
  activeRoutine=(ROUTINES[state.activeChild]||[]).find(routine=>routine.id===id);
  if(!activeRoutine)return;
  const progress=getRoutineProgress(activeRoutine.id);
  activeStepIds=new Set(progress.steps||[]);
  const theme=activeTheme();
  els.safeBonus.textContent="+ Safe Body";
  els.safeBonus.disabled=false;
  els.safeBonus.style.display=state.activeChild==="Zach"?"block":"none";
  els.modalIcon.textContent=theme.icons[activeRoutine.iconIndex]||"⭐";
  els.modalRoutineTitle.textContent=activeRoutine.title;
  els.scriptBox.textContent=activeRoutine.script;
  renderSteps();
  els.routineModal.classList.add("open");
}

function renderSteps(){
  els.stepsList.innerHTML="";
  activeRoutine.steps.forEach(step=>{
    const done=activeStepIds.has(step.id);
    const button=document.createElement("button");
    button.type="button";
    button.className=`step-btn ${done?"done":""}`;
    button.innerHTML=`<span class="step-name"><span class="check">${done?"✓":""}</span>${step.label}</span><span>${done?"Saved":`+${step.points}`}</span>`;
    button.addEventListener("click",()=>toggleStep(step.id));
    els.stepsList.appendChild(button);
  });
}

function toggleStep(stepId){
  if(!activeRoutine)return;
  if(activeStepIds.has(stepId))return;
  const step=activeRoutine.steps.find(item=>item.id===stepId);
  if(!step)return;
  activeStepIds.add(stepId);
  const progress=getRoutineProgress(activeRoutine.id);
  progress.steps=Array.from(activeStepIds);
  saveState();
  renderSteps();
  renderRoutines(activeTheme());
  addPoints(step.points,`${activeRoutine.title}: ${step.label}`,activeRoutine.title);
}

function getRoutineProgress(routineId,child=state.activeChild){
  const currentChildState=state.children[child];
  currentChildState.routineProgress=currentChildState.routineProgress||{};
  currentChildState.routineProgress[routineId]=currentChildState.routineProgress[routineId]||{steps:[],bonusAwarded:false};
  return currentChildState.routineProgress[routineId];
}

function finishActiveTask(){
  if(!activeRoutine)return;
  const progress=getRoutineProgress(activeRoutine.id);
  const allStepsDone=activeRoutine.steps.every(step=>activeStepIds.has(step.id));

  if(allStepsDone && activeRoutine.bonus>0 && !progress.bonusAwarded){
    progress.bonusAwarded=true;
    saveState();
    addPoints(activeRoutine.bonus,`${activeRoutine.title} bonus`,activeRoutine.title);
  }

  // Task completion clears only the checkmarks/progress so the task can be earned again.
  clearRoutineProgress(activeRoutine.id);
  closeRoutineModal();
  render();
}

function clearRoutineProgress(routineId,child=state.activeChild){
  const currentChildState=state.children[child];
  currentChildState.routineProgress=currentChildState.routineProgress||{};
  currentChildState.routineProgress[routineId]={steps:[],bonusAwarded:false};
  saveState();
}

function closeRoutineModal(){
  els.routineModal.classList.remove("open");
  activeRoutine=null;
  activeStepIds=new Set();
}

function addPoints(points,label,routine=""){
  const currentChildState=childState();
  currentChildState.points+=Number(points);
  currentChildState.log.push({points:Number(points),label,time:new Date().toLocaleTimeString([],{hour:"numeric",minute:"2-digit"})});
  saveState();
  render();
  ignoreCloudUntil=Date.now()+12000;
  cloudRequest("add",{child:state.activeChild,points,label,routine,parent:PARENT_NAME,tokenType:CHILDREN[state.activeChild].token})
    .then(cloud=>{ignoreCloudUntil=0;applyCloudState(cloud)})
    .catch(()=>{});
}

function undoLast(){
  const currentChildState=childState();
  if(!currentChildState.log.length)return;
  const last=currentChildState.log.pop();
  currentChildState.points=Math.max(0,currentChildState.points-Number(last.points||0));
  rebuildRoutineProgressFromLog(state.activeChild);
  saveState();
  render();
  ignoreCloudUntil=Date.now()+12000;
  cloudRequest("undo",{child:state.activeChild,parent:PARENT_NAME})
    .then(cloud=>{ignoreCloudUntil=0;applyCloudState(cloud)})
    .catch(()=>{});
}

function parentReset(){
  if(!confirm(`Parent reset for ${state.activeChild}? This clears banked points for this child only.`))return;
  resetLocalChild(state.activeChild);
  saveState();
  render();
  ignoreCloudUntil=Date.now()+12000;
  cloudRequest("reset",{child:state.activeChild,parent:PARENT_NAME})
    .then(cloud=>{ignoreCloudUntil=0;applyCloudState(cloud)})
    .catch(()=>{});
}

function claimPrize(){
  const max=maxReward();
  if(!max)return;
  if(!confirm(`${state.activeChild} claimed: ${max.label}. Reset ${state.activeChild}'s points to 0?`))return;
  resetLocalChild(state.activeChild);
  saveState();
  render();
  ignoreCloudUntil=Date.now()+12000;
  cloudRequest("claim",{child:state.activeChild,parent:PARENT_NAME,prize:max.label,points:max.points})
    .then(cloud=>{ignoreCloudUntil=0;applyCloudState(cloud)})
    .catch(()=>{});
}

function resetLocalChild(child){
  state.children[child].points=0;
  state.children[child].log=[];
  state.children[child].routineProgress={};
}

function openSettings(){
  const rewards=childRewards();
  els.settingsTitle.textContent=`${state.activeChild} Settings`;
  els.settingsHint.textContent=`These settings only affect ${state.activeChild}.`;
  els.themeSelect.value=childTheme();
  [0,1,2,3].forEach(index=>{
    els[`rewardPts${index+1}`].value=rewards[index]?.points||"";
    els[`reward${index+1}`].value=rewards[index]?.label||"";
  });
  els.settingsModal.classList.add("open");
}

function closeSettings(){els.settingsModal.classList.remove("open")}

function saveSettings(){
  childState().theme=els.themeSelect.value;
  const fallback=CHILDREN[state.activeChild].rewards;
  const raw=[0,1,2,3]
    .map(index=>({points:Number(els[`rewardPts${index+1}`].value||fallback[index].points),label:(els[`reward${index+1}`].value||fallback[index].label).trim()}))
    .filter(reward=>reward.points>0&&reward.label);
  raw.sort((a,b)=>a.points-b.points);
  childState().rewards=raw.length?raw:fallback;
  saveState();
  render();
  cloudRequest("settings",{child:state.activeChild,theme:childState().theme,rewards:JSON.stringify(childState().rewards),parent:PARENT_NAME})
    .then(cloud=>{ignoreCloudUntil=0;applyCloudState(cloud)})
    .catch(()=>{});
  closeSettings();
}

function cycleTheme(){
  const keys=Object.keys(THEMES);
  const currentIndex=keys.indexOf(childTheme());
  childState().theme=keys[(currentIndex+1)%keys.length];
  saveState();
  render();
  cloudRequest("settings",{child:state.activeChild,theme:childState().theme,rewards:JSON.stringify(childRewards()),parent:PARENT_NAME})
    .then(cloud=>{ignoreCloudUntil=0;applyCloudState(cloud)})
    .catch(()=>{});
}

function syncFromCloud(){
  if(!CLOUD_WEB_APP_URL)return Promise.resolve(null);
  if(Date.now()<ignoreCloudUntil)return Promise.resolve(null);
  return cloudRequest("state",{child:state.activeChild}).then(applyCloudState).catch(()=>null);
}

function applyCloudState(cloud){
  if(!cloud||!cloud.ok)return;
  if(Date.now()<ignoreCloudUntil)return;

  if(cloud.children){
    Object.keys(cloud.children).forEach(child=>{
      if(state.children[child]){
        state.children[child].points=Number(cloud.children[child].points||0);
        state.children[child].log=Array.isArray(cloud.children[child].log)?cloud.children[child].log:[];
        if(cloud.children[child].theme&&THEMES[cloud.children[child].theme]) state.children[child].theme=cloud.children[child].theme;
        if(Array.isArray(cloud.children[child].rewards)&&cloud.children[child].rewards.length) state.children[child].rewards=cloud.children[child].rewards;
        rebuildRoutineProgressFromLog(child);
      }
    });
  }

  saveState();
  render();
}

function rebuildRoutineProgressFromLog(child){
  const currentChildState=state.children[child];
  currentChildState.routineProgress=currentChildState.routineProgress||{};
  const routines=ROUTINES[child]||[];
  const activeProgress=currentChildState.routineProgress;

  // Preserve in-progress local checkmarks. Do not rebuild completed/cleared tasks from banked log.
  routines.forEach(routine=>{
    activeProgress[routine.id]=activeProgress[routine.id]||{steps:[],bonusAwarded:false};
  });
}

function cloudRequest(action,params={}){
  if(!CLOUD_WEB_APP_URL)return Promise.resolve(null);
  return new Promise((resolve,reject)=>{
    const callbackName=`powerUpCallback_${Date.now()}_${Math.floor(Math.random()*100000)}`;
    const script=document.createElement("script");
    const url=new URL(CLOUD_WEB_APP_URL);
    url.searchParams.set("action",action);
    url.searchParams.set("callback",callbackName);
    url.searchParams.set("_ts",String(Date.now()));
    Object.entries(params).forEach(([key,value])=>url.searchParams.set(key,String(value)));

    const timer=setTimeout(()=>{cleanup();reject(new Error("Cloud timeout"))},8000);
    window[callbackName]=data=>{cleanup();resolve(data)};
    script.onerror=()=>{cleanup();reject(new Error("Cloud failed"))};

    function cleanup(){
      clearTimeout(timer);
      delete window[callbackName];
      script.remove();
    }

    script.src=url.toString();
    document.body.appendChild(script);
  });
}

function getPreviousTier(nextPoints){
  const previous=sortedRewards().filter(reward=>Number(reward.points)<Number(nextPoints)).map(reward=>Number(reward.points));
  return previous.length?Math.max(...previous):0;
}

function loadState(){
  try{
    const saved=JSON.parse(localStorage.getItem(STORAGE_KEY));
    if(!saved)return structuredClone(defaultState);
    const merged=structuredClone(defaultState);
    Object.assign(merged,saved);
    merged.children={...structuredClone(defaultState.children),...(saved.children||{})};
    Object.keys(merged.children).forEach(child=>{
      merged.children[child].theme=merged.children[child].theme||CHILDREN[child].theme;
      merged.children[child].rewards=merged.children[child].rewards||CHILDREN[child].rewards;
      merged.children[child].log=Array.isArray(merged.children[child].log)?merged.children[child].log:[];
      merged.children[child].points=Number(merged.children[child].points||0);
      merged.children[child].routineProgress=merged.children[child].routineProgress||{};
    });
    return merged;
  }catch(error){
    return structuredClone(defaultState);
  }
}

function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}
</script>
